server {
    listen 80;
    server_name silvadata.me www.silvadata.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name silvadata.me www.silvadata.me;

    ssl_certificate /etc/nginx/ssl/silvadata_full.crt;
    ssl_certificate_key /etc/nginx/ssl/silvadata.key;

    # IMPORTANTE: Mime types para que no salga el error de "text/html"
    include /etc/nginx/mime.types;

    # 1. PRIORIDAD MÁXIMA: Silva-OS (n8n)
    location ^~ /n8n/ {
        # Usamos el nombre del contenedor directamente
        proxy_pass http://n8n_silva:5678; 
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /n8n;

        # Optimizaciones de flujo
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        
        # Aumentamos el tiempo de espera por si el servidor está lento
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 2. Redirección si falta la barra
    location = /n8n {
        return 301 https://$host/n8n/;
    }

    # 3. Tu cerebro (Django API)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Tu cara (React Frontend) - Al final como "catch-all"
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /media/ {
        alias /app/media/;
    }
}