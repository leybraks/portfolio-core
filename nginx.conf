server {
    listen 80;
    server_name silvadata.me www.silvadata.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name silvadata.me www.silvadata.me;

    ssl_certificate /etc/nginx/ssl/silvadata_full.crt;
    ssl_certificate_key /etc/nginx/ssl/silvadata.key;

    # VITAL: Para que el navegador no confunda JS con HTML
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 1. PRIORIDAD MÁXIMA: Silva-OS (n8n)
    # El modificador ^~ obliga a Nginx a detenerse aquí si la ruta coincide
    location ^~ /n8n/ {
        proxy_pass http://n8n_silva:5678; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /n8n;

        # Optimizaciones para evitar el lag de la IA
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout 600s;
        
        # Evita que Nginx intente mostrar errores de React para n8n
        proxy_intercept_errors off;
    }

    # 2. Redirección si falta la barra final
    location = /n8n {
        return 301 https://$host/n8n/;
    }

    # 3. Tu cerebro (Django API)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Tu cara (React Frontend) - AL FINAL
    # Al estar al final, solo responderá si no es /n8n/ ni /api/
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /media/ {
        alias /app/media/;
    }
}