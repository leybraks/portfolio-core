server {
    listen 80;
    server_name silvadata.me www.silvadata.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name silvadata.me www.silvadata.me;

    ssl_certificate /etc/nginx/ssl/silvadata_full.crt;
    ssl_certificate_key /etc/nginx/ssl/silvadata.key;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    location ^~ /n8n/ {
        # ← FIX: Eliminar el types{} local. El include global ya cubre todo.
        proxy_pass http://n8n:5678/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /n8n;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # ← FIX: Capturar los assets estáticos de n8n que llegan con ruta absoluta
    location ^~ /assets/ {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}