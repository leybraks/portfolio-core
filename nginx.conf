server {
    listen 80;
    server_name silvadata.me www.silvadata.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name silvadata.me www.silvadata.me;

    ssl_certificate /etc/nginx/ssl/silvadata_full.crt;
    ssl_certificate_key /etc/nginx/ssl/silvadata.key;

    # ESTO ARREGLA EL ERROR DE MIME TYPE
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 1. MOTOR N8N (SILVA-OS) - PRIORIDAD ABSOLUTA
    location ^~ /n8n/ {
        # Usamos el nombre del servicio definido en docker-compose
        proxy_pass http://n8n:5678; 
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /n8n;

        # Evitar que Nginx intercepte errores y mande el HTML de React
        proxy_intercept_errors off;
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;

        # Tiempos de espera para procesos largos
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 2. API DJANGO
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. ADMIN DJANGO
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # 4. FRONTEND REACT (CATCH-ALL)
    # Solo llega aquí si NO es /n8n/, /api/ o /admin/
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location /media/ {
        alias /app/media/;
    }
}