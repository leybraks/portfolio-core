server {
    listen 80;
    server_name silvadata.me www.silvadata.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name silvadata.me www.silvadata.me;

    ssl_certificate /etc/nginx/ssl/silvadata_full.crt;
    ssl_certificate_key /etc/nginx/ssl/silvadata.key;

    # VITAL: Para que el navegador entienda JS y CSS
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 1. Redirección limpia para n8n
    location = /n8n {
        return 301 https://$host/n8n/;
    }

    # 2. PRIORIDAD MÁXIMA: El motor Silva-OS (n8n)
    # Usamos ^~ para que Nginx deje de buscar otras rutas si coincide esta
    location ^~ /n8n/ {
        proxy_pass http://n8n:5678; # Sin barra al final para respetar N8N_PATH
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /n8n;

        # Evita errores de compresión y lag
        proxy_set_header Accept-Encoding "";
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_hide_header X-Frame-Options;
    }

    # 3. Tu cerebro (Django API)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Archivos estáticos
    location /media/ {
        alias /app/media/;
    }

    # 5. CATCH-ALL: Tu cara (React Frontend)
    # Se pone al final para que solo responda si nada de lo de arriba coincidió
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}