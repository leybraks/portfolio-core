server {
    listen 80;
    server_name silvadata.me www.silvadata.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name silvadata.me www.silvadata.me;

    ssl_certificate /etc/nginx/ssl/silvadata_full.crt;
    ssl_certificate_key /etc/nginx/ssl/silvadata.key;

    # 1. ESTO EVITA LA PANTALLA EN BLANCO Y EL ERROR DE MIME TYPE
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 2. Tu motor Silva-OS (n8n) - VA PRIMERO Y BLINDADO CON ^~
    location ^~ /n8n/ {
        proxy_pass http://n8n:5678; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ESTO LE DICE A N8N DÓNDE ESTÁN SUS SCRIPTS
        proxy_set_header X-Forwarded-Prefix /n8n;
       
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # 3. Tu cerebro (Django API)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Django Admin
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. La ruta interna de tu contenedor backend
    location /media/ {
        alias /app/media/; 
    }

    # 6. Tu cara (React) - VA AL FINAL SIEMPRE
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}